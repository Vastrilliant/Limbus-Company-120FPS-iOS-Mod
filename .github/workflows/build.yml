name: Build LimbusFPS dylib

on:
  push:
    paths:
      - 'fps120.m'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Build universal (arm64 + arm64e) iOS dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun --sdk iphoneos clang \
            -arch arm64 -arch arm64e \
            -dynamiclib \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -fobjc-arc \
            -framework Foundation \
            -framework UIKit \
            -framework QuartzCore \
            -o LimbusFPS.dylib \
            fps120.m

      - name: Verify slices & platform
        run: |
          lipo -info LimbusFPS.dylib
          otool -l LimbusFPS.dylib | grep -A4 LC_BUILD_VERSION

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimbusFPS-dylib
          path: LimbusFPS.dylib
